services:
  - type: web
    name: ipscope
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KIPRIS_SERVICE_KEY
        sync: false   # inject via Render dashboard — never commit key
    autoDeploy: true

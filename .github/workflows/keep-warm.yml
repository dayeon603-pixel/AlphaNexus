name: keep-ipscope-warm

# Sustainable keep-warm for the ipscope demo on Render's free tier.
#
# Render free web services spin down after ~15 min idle; the next visitor then
# waits ~20-30s for a cold start. This pings /health often enough to prevent the
# spin-down — but ONLY during KST waking hours, so it does not exhaust Render's
# 750 instance-hours/month free budget (a naive 24/7 ping burns ~720h and can
# get this *and other* free services suspended near month-end).
#
# Window: UTC 23:00-16:59  ==  KST 08:00-01:59 (the hours a judge/visitor opens
# the link). It sleeps KST 02:00-08:00, when ~no one is looking.
#   ~18h warm/day x 30d  ~=  540 instance-hours  <  750 free budget.  Headroom kept.

on:
  schedule:
    - cron: "*/10 0-16,23 * * *"   # every 10 min within the warm window (UTC)
  workflow_dispatch: {}            # lets you wake it on demand before a live demo

permissions:
  contents: read

concurrency:
  group: keep-ipscope-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Wake /health (tolerant of one cold start)
        run: |
          URL="https://ipscope.onrender.com/health"
          for attempt in 1 2 3; do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 120 "$URL" || echo "000")
            echo "attempt $attempt -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "::warning::ipscope did not return 200 after 3 attempts (instance may be down)"
          exit 1
